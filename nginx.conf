# Nginx config for Caiena Beauty Nails
# Install: scp nginx.conf root@178.156.176.15:/etc/nginx/sites-available/caiena.com
# Enable: ssh root@178.156.176.15 "ln -sf /etc/nginx/sites-available/caiena.com /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx"
# SSL:    ssh root@178.156.176.15 "certbot --nginx -d caiena.com -d www.caiena.com"

upstream caiena_backend {
    server 127.0.0.1:3007;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name caiena.com www.caiena.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static assets from public folder
    location ~* ^/(.+\.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|xml|json|txt|pdf))$ {
        root /var/www/caiena/public;
        try_files /$1 @backend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Next.js static assets (immutable)
    location /_next/static/ {
        alias /var/www/caiena/.next/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://caiena_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # API routes
    location /api/ {
        proxy_pass http://caiena_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Named backend fallback
    location @backend {
        proxy_pass http://caiena_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other routes
    location / {
        proxy_pass http://caiena_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # Max upload size (for future image uploads)
    client_max_body_size 50M;
}
