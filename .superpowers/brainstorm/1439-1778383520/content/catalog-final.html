<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caiena — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════════ */
:root {
  --bg:          #050505;
  --surface:     #0d0d0d;
  --border:      rgba(255,255,255,0.07);
  --border-mid:  rgba(255,255,255,0.15);
  --text:        #f2efe9;
  --text-dim:    rgba(242,239,233,0.35);
  --text-mid:    rgba(242,239,233,0.60);
  --serif:       'Cormorant Garamond', Georgia, serif;
  --sans:        'Jost', 'Helvetica Neue', Arial, sans-serif;
  --ease-silk:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.3,  0.64, 1);
  --ease-back:   cubic-bezier(0.55, 0,    0.1,  1);
  --card-w:      clamp(160px, 26vw, 300px);
  --card-ratio:  2/3;
  --gap:         clamp(10px, 1.5vw, 20px);
  --side-pad:    clamp(20px, 5vw, 56px);
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--sans); font-weight: 300;
  min-height: 100dvh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  cursor: default;
}

/* ═══════════════════════════════════════════════════════════
   CUSTOM CURSOR (desktop)
═══════════════════════════════════════════════════════════ */
@media (pointer: fine) {
  body { cursor: none; }
  #cursor {
    position: fixed; top: 0; left: 0; z-index: 9999;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text); pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width 0.3s var(--ease-silk),
                height 0.3s var(--ease-silk),
                background 0.3s,
                opacity 0.3s;
    will-change: transform;
  }
  #cursor.hovering {
    width: 40px; height: 40px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.5);
  }
  #cursor.clicking { width: 6px; height: 6px; }
}
#cursor { display: none; }
@media (pointer: fine) { #cursor { display: block; } }

/* ═══════════════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════════════ */
nav {
  position: fixed; inset: 0 0 auto 0; z-index: 300;
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px var(--side-pad);
  background: linear-gradient(to bottom, rgba(5,5,5,0.96) 0%, transparent 100%);
  pointer-events: none;
}
nav > * { pointer-events: all; }
.logo {
  font-family: var(--serif); font-size: 18px; font-weight: 300;
  letter-spacing: 0.22em; text-transform: uppercase; font-style: italic;
}
.nav-links {
  display: flex; gap: 32px;
  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-mid);
}
.nav-links a { color: inherit; text-decoration: none; transition: color 0.2s; cursor: pointer; }
.nav-links a:hover { color: var(--text); }
@media (max-width: 540px) { .nav-links { display: none; } }

/* ═══════════════════════════════════════════════════════════
   HERO / SECTION HEAD
═══════════════════════════════════════════════════════════ */
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: clamp(90px, 14vw, 120px) var(--side-pad) clamp(28px, 4vw, 44px);
  flex-wrap: wrap; gap: 16px;
}
.eyebrow {
  font-size: 9px; letter-spacing: 0.38em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 10px;
}
.section-head h1 {
  font-family: var(--serif); font-size: clamp(32px, 6vw, 64px);
  font-weight: 300; line-height: 1.05; letter-spacing: 0.03em;
}
.section-head h1 em { font-style: italic; color: var(--text-mid); }
.design-count {
  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-dim); align-self: flex-end;
}

/* ═══════════════════════════════════════════════════════════
   CAROUSEL WRAPPER (clips overflow, adds edge fades)
═══════════════════════════════════════════════════════════ */
.carousel-outer {
  position: relative;
  padding-bottom: 0;
  --mask-w: clamp(20px, 5vw, 56px);
  mask-image: linear-gradient(
    to right,
    transparent 0,
    black var(--mask-w),
    black calc(100% - var(--mask-w)),
    transparent 100%
  );
  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0,
    black var(--mask-w),
    black calc(100% - var(--mask-w)),
    transparent 100%
  );
}

/* ─── Track ─────────────────────────────────────────────── */
.carousel-track {
  display: flex;
  gap: var(--gap);
  padding: 12px var(--side-pad) 28px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  will-change: scroll-position;
}
.carousel-track::-webkit-scrollbar { display: none; }

/* ═══════════════════════════════════════════════════════════
   DESIGN CARD
═══════════════════════════════════════════════════════════ */
.design-card {
  flex: 0 0 var(--card-w);
  scroll-snap-align: center;
  cursor: pointer;
  display: flex; flex-direction: column;
  gap: 0;
  /* Animate in on page load */
  animation: cardReveal 0.8s var(--ease-silk) both;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.design-card:nth-child(1) { animation-delay: 0.05s; }
.design-card:nth-child(2) { animation-delay: 0.12s; }
.design-card:nth-child(3) { animation-delay: 0.19s; }
.design-card:nth-child(4) { animation-delay: 0.26s; }
.design-card:nth-child(5) { animation-delay: 0.33s; }
.design-card:nth-child(6) { animation-delay: 0.40s; }

/* Image wrapper */
.card-img {
  aspect-ratio: var(--card-ratio);
  overflow: hidden;
  position: relative;
  background: #0e0e0e;
}
.card-bg {
  position: absolute; inset: 0;
  transition: transform 1.1s var(--ease-silk);
  will-change: transform;
}
.design-card:hover .card-bg { transform: scale(1.05); }

.card-vignette {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    to top,
    rgba(5,5,5,0.80) 0%,
    rgba(5,5,5,0.15) 45%,
    transparent 70%
  );
}

/* 4 pose pips (top-left) */
.card-pips {
  position: absolute; top: 13px; left: 13px; z-index: 2;
  display: flex; gap: 4px; align-items: center;
}
.pip {
  width: 16px; height: 2px; border-radius: 1px;
  background: rgba(255,255,255,0.20);
  transition: background 0.3s, width 0.3s;
}
.pip.on { background: rgba(255,255,255,0.80); width: 22px; }

/* Badge (top-right) */
.card-badge {
  position: absolute; top: 13px; right: 13px; z-index: 2;
  font-size: 7px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.16);
  padding: 3px 7px; line-height: 1;
}

/* Name (over vignette) */
.card-name {
  position: absolute; bottom: 14px; left: 14px; right: 14px; z-index: 2;
  font-family: var(--serif); font-size: clamp(14px, 1.8vw, 18px);
  font-weight: 300; letter-spacing: 0.04em; line-height: 1.2;
}

/* Card footer */
.card-foot {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 12px 2px 0;
  border-top: 1px solid var(--border);
  margin-top: 0;
}
.card-attrs {
  font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-dim); display: flex; gap: 0; flex-wrap: wrap;
}
.card-attrs span + span::before { content: ' · '; }
.card-chevron {
  font-size: 11px; color: var(--text-dim);
  transition: transform 0.35s var(--ease-silk), color 0.2s;
}
.design-card:hover .card-chevron { transform: translateX(5px); color: var(--text); }

/* ═══════════════════════════════════════════════════════════
   CONTROLS BAR
═══════════════════════════════════════════════════════════ */
.controls-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--side-pad) clamp(32px, 5vw, 56px);
}

/* Progress bar dots */
.progress-dots { display: flex; gap: 7px; align-items: center; }
.pdot {
  height: 1px; border-radius: 1px;
  background: rgba(255,255,255,0.18);
  cursor: pointer; transition: all 0.35s var(--ease-silk);
  width: 20px;
}
.pdot.active { background: rgba(255,255,255,0.70); width: 36px; }

/* Right side controls */
.controls-right { display: flex; align-items: center; gap: 16px; }

.scroll-label {
  font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-dim);
}

/* Play/Pause button */
.pause-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border-mid);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-mid);
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  font-size: 10px;
}
.pause-btn:hover { border-color: rgba(255,255,255,0.35); color: var(--text); background: rgba(255,255,255,0.05); }

/* ═══════════════════════════════════════════════════════════
   OVERLAY
═══════════════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; z-index: 400;
  display: grid; place-items: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.overlay.open { opacity: 1; pointer-events: all; }

/* Backdrop — click = close */
.ov-backdrop {
  position: absolute; inset: 0;
  background: rgba(3,3,3,0.90);
  backdrop-filter: blur(18px) saturate(0.2);
  -webkit-backdrop-filter: blur(18px) saturate(0.2);
  cursor: pointer; /* visual hint */
}

/* Panel */
.ov-panel {
  position: relative; z-index: 1;
  width: min(90vw, 560px);
  max-height: 92dvh;
  display: flex; flex-direction: column;
  /* Slide-up + scale entrance */
  transform: translateY(40px) scale(0.97);
  transition: transform 0.55s var(--ease-spring);
  pointer-events: all;
}
.overlay.open .ov-panel {
  transform: translateY(0) scale(1);
}

/* Panel header */
.ov-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.ov-back {
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  padding: 4px 0;
}
.ov-back-line {
  width: 28px; height: 1px; background: var(--text-mid);
  transition: width 0.3s var(--ease-silk);
}
.ov-back:hover .ov-back-line { width: 42px; }
.ov-back-label {
  font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-mid);
}

.ov-title {
  font-family: var(--serif); font-size: clamp(24px, 5vw, 40px);
  font-weight: 300; letter-spacing: 0.05em; line-height: 1.1;
}
.ov-attrs {
  font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-dim); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 0;
}
.ov-attrs span + span::before { content: ' · '; }

/* Deck */
.ov-deck-row {
  display: flex; align-items: center; justify-content: center;
  gap: clamp(14px, 3vw, 28px);
  flex: 1; min-height: 0;
}

.deck-stage {
  position: relative;
  width: clamp(130px, 28vw, 200px);
  height: clamp(195px, 42vw, 300px);
  flex-shrink: 0;
}

.pcard {
  position: absolute;
  width: clamp(110px, 24vw, 174px);
  height: clamp(165px, 36vw, 261px);
  left: 50%; top: 50%;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.10);
  will-change: transform, opacity;
}
.pcard-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.pcard-vig { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 50%); }
.pcard-lbl {
  position: absolute; bottom: 10px; left: 10px;
  font-size: 7px; letter-spacing: 0.30em; text-transform: uppercase;
  color: rgba(255,255,255,0.50);
}

/* Arrow buttons */
.deck-arrow {
  width: clamp(34px, 5vw, 42px); height: clamp(34px, 5vw, 42px);
  border: 1px solid var(--border-mid);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  font-size: 13px; color: var(--text-mid);
  transition: border-color 0.2s, color 0.2s, transform 0.15s;
  user-select: none;
}
.deck-arrow:hover { border-color: rgba(255,255,255,0.35); color: var(--text); }
.deck-arrow:active { transform: scale(0.88); }

/* Pose dots (below deck) */
.ov-pose-dots { display: flex; gap: 6px; justify-content: center; padding-top: 16px; }
.ov-pdot {
  height: 1px; border-radius: 1px;
  background: rgba(255,255,255,0.18);
  cursor: pointer; transition: all 0.3s;
  width: 18px;
}
.ov-pdot.active { background: rgba(255,255,255,0.70); width: 32px; }

/* CTA */
.ov-cta {
  display: flex; gap: 10px; margin-top: 24px;
  border-top: 1px solid var(--border); padding-top: 20px;
}
.btn-outline {
  flex: 1; padding: 13px;
  background: transparent; color: var(--text-mid);
  border: 1px solid var(--border-mid);
  font-family: var(--sans); font-weight: 300;
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-outline:hover { border-color: rgba(255,255,255,0.35); color: var(--text); }
.btn-solid {
  flex: 2; padding: 13px;
  background: var(--text); color: var(--bg);
  border: none;
  font-family: var(--sans); font-weight: 300;
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-solid:hover { opacity: 0.86; }

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════ */
@media (max-width: 540px) {
  :root { --card-w: 70vw; --side-pad: 20px; --gap: 12px; }
  .controls-right .scroll-label { display: none; }
  .ov-panel { width: 95vw; }
}
@media (min-width: 1200px) {
  :root { --card-w: 22vw; }
}
</style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Nav -->
<nav>
  <div class="logo">Caiena</div>
  <div class="nav-links">
    <a>Catálogo</a>
    <a>Reservar</a>
    <a>Try-On</a>
  </div>
</nav>

<!-- Section header -->
<div class="section-head">
  <div>
    <div class="eyebrow">Colección 2026</div>
    <h1>Diseños<br><em>de Uñas</em></h1>
  </div>
  <div class="design-count" id="designCount"></div>
</div>

<!-- Carousel -->
<div class="carousel-outer">
  <div class="carousel-track" id="carouselTrack"></div>
</div>

<!-- Controls -->
<div class="controls-bar">
  <div class="progress-dots" id="progressDots"></div>
  <div class="controls-right">
    <span class="scroll-label" id="scrollLabel">Reproduciendo</span>
    <button class="pause-btn" id="pauseBtn" title="Pausar / reanudar">⏸</button>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="ov-backdrop" id="ovBackdrop"></div>

  <div class="ov-panel">
    <div class="ov-head">
      <div class="ov-back" id="ovBack">
        <div class="ov-back-line"></div>
        <span class="ov-back-label">Todos los diseños</span>
      </div>
      <div>
        <div class="ov-title" id="ovTitle"></div>
        <div class="ov-attrs" id="ovAttrs"></div>
      </div>
    </div>

    <div class="ov-deck-row">
      <div class="deck-arrow" id="deckPrev">←</div>
      <div>
        <div class="deck-stage" id="deckStage"></div>
        <div class="ov-pose-dots" id="poseDots"></div>
      </div>
      <div class="deck-arrow" id="deckNext">→</div>
    </div>

    <div class="ov-cta">
      <button class="btn-outline">Guardar</button>
      <button class="btn-solid">Agendar mi cita →</button>
    </div>
  </div>
</div>

<script>
/* ── DATA ─────────────────────────────────────────────────── */
const DESIGNS = [
  { name:'French Nude',  attrs:['Nude','Almendra','Glossy','French'],    bg:'linear-gradient(148deg,#3c2418 0%,#0c0603 100%)', badge:null },
  { name:'Estrellas',    attrs:['Blanco','Almendra','Nail Art'],          bg:'linear-gradient(155deg,#1c2e14 0%,#060c05 100%)', badge:'Nuevo' },
  { name:'Rosa Sutil',   attrs:['Rosa','Oval','Satinado','Sólido'],       bg:'linear-gradient(148deg,#2e1424 0%,#0c0609 100%)', badge:null },
  { name:'Rojo Mate',    attrs:['Rojo','Cuadrada','Matte','Sólido'],      bg:'linear-gradient(148deg,#300c0c 0%,#0c0404 100%)', badge:'Popular' },
  { name:'Ombré Nude',   attrs:['Nude','Almendra','Chrome','Ombré'],      bg:'linear-gradient(155deg,#181830 0%,#060610 100%)', badge:null },
  { name:'Dorado',       attrs:['Dorado','Stiletto','Glitter'],           bg:'linear-gradient(148deg,#28220c 0%,#0e0c04 100%)', badge:'Temporada' },
];
const POSES = [
  { label:'Garra',      bg:'linear-gradient(148deg,#2e1c0c,#080502)' },
  { label:'Ascendente', bg:'linear-gradient(148deg,#0e2016,#040806)' },
  { label:'Doble',      bg:'linear-gradient(148deg,#0e0e24,#040408)' },
  { label:'Rocío',      bg:'linear-gradient(148deg,#221e0a,#0a0a04)' },
];

/* ── CAROUSEL AUTO-SCROLL ─────────────────────────────────── */
const track   = document.getElementById('carouselTrack');
const dotsEl  = document.getElementById('progressDots');
const pauseBtn= document.getElementById('pauseBtn');
const label   = document.getElementById('scrollLabel');
document.getElementById('designCount').textContent = DESIGNS.length + ' diseños';

// Build cards
DESIGNS.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'design-card';
  card.style.animationDelay = `${0.05 + i * 0.07}s`;
  card.innerHTML = `
    <div class="card-img">
      <div class="card-bg" style="background:${d.bg}"></div>
      <div class="card-vignette"></div>
      <div class="card-pips">
        ${POSES.map((_,pi)=>`<div class="pip${pi===0?' on':''}"></div>`).join('')}
      </div>
      ${d.badge?`<div class="card-badge">${d.badge}</div>`:''}
      <div class="card-name">${d.name}</div>
    </div>
    <div class="card-foot">
      <div class="card-attrs">${d.attrs.map(a=>`<span>${a}</span>`).join('')}</div>
      <span class="card-chevron">→</span>
    </div>`;
  card.addEventListener('click', () => openOverlay(i));
  track.appendChild(card);

  const dot = document.createElement('div');
  dot.className = 'pdot' + (i===0?' active':'');
  dot.addEventListener('click', () => scrollTo(i));
  dotsEl.appendChild(dot);
});

// Auto-scroll: smooth pixel-by-pixel using rAF
let playing = true;
let raf;
let lastTs = null;
const SPEED = 40; // px/sec

function autoScroll(ts) {
  if (!playing) return;
  if (lastTs !== null) {
    const dt = (ts - lastTs) / 1000;
    const max = track.scrollWidth - track.clientWidth;
    track.scrollLeft += SPEED * dt;
    if (track.scrollLeft >= max - 1) {
      // Seamless loop: jump back to 0 without animation
      track.style.scrollBehavior = 'auto';
      track.scrollLeft = 0;
      track.style.scrollBehavior = '';
    }
  }
  lastTs = ts;
  raf = requestAnimationFrame(autoScroll);
}
raf = requestAnimationFrame(autoScroll);

// Pause on hover / touch
track.addEventListener('pointerenter', () => { lastTs = null; cancelAnimationFrame(raf); });
track.addEventListener('pointerleave', () => {
  if (playing) { lastTs = null; raf = requestAnimationFrame(autoScroll); }
});
track.addEventListener('touchstart', () => { lastTs = null; cancelAnimationFrame(raf); }, { passive: true });
track.addEventListener('touchend', () => {
  if (playing) setTimeout(() => { lastTs = null; raf = requestAnimationFrame(autoScroll); }, 1800);
}, { passive: true });

pauseBtn.addEventListener('click', () => {
  playing = !playing;
  pauseBtn.textContent = playing ? '⏸' : '▶';
  label.textContent = playing ? 'Reproduciendo' : 'En pausa';
  if (playing) { lastTs = null; raf = requestAnimationFrame(autoScroll); }
  else cancelAnimationFrame(raf);
});

// Dots sync
track.addEventListener('scroll', () => {
  const pct = track.scrollLeft / (track.scrollWidth - track.clientWidth);
  const idx = Math.round(pct * (DESIGNS.length - 1));
  document.querySelectorAll('.pdot').forEach((d,i) => d.classList.toggle('active', i===idx));
}, { passive: true });

function scrollTo(idx) {
  const card = track.children[idx];
  track.scrollTo({ left: card.offsetLeft - parseInt(getComputedStyle(track).paddingLeft), behavior: 'smooth' });
}

/* ── POSE DECK ────────────────────────────────────────────── */
let poseIdx = 0;
let deckAnim = false;
let activeDesign = 0;

function rel(i) {
  const n = POSES.length;
  let d = ((i - poseIdx) % n + n) % n;
  if (d > n/2) d -= n;
  return d;
}

function buildDeck() {
  const stage = document.getElementById('deckStage');
  stage.innerHTML = '';
  const n = POSES.length;
  const order = [...Array(n).keys()].sort((a,b) => Math.abs(rel(b)) - Math.abs(rel(a)));
  order.forEach(i => {
    const r = rel(i);
    const card = document.createElement('div');
    card.className = 'pcard';
    card.dataset.i = i;
    const tx = -50 + r*12, ty = -50 + Math.abs(r)*10;
    card.style.cssText = `
      transform:translate(${tx}%,${ty}%) rotate(${r*5.5}deg) scale(${1-Math.abs(r)*0.1});
      opacity:${1-Math.abs(r)*0.28}; z-index:${n-Math.abs(r)}; transition:none;`;
    card.innerHTML = `
      <div class="pcard-bg" style="background:${DESIGNS[activeDesign].bg}"></div>
      <div class="pcard-vig"></div>
      <div class="pcard-lbl">${POSES[i].label}</div>`;
    stage.appendChild(card);
  });

  const pd = document.getElementById('poseDots');
  pd.innerHTML = '';
  POSES.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'ov-pdot'+(i===poseIdx?' active':'');
    d.addEventListener('click', () => moveDeck(i-poseIdx));
    pd.appendChild(d);
  });
}

function moveDeck(dir) {
  if (deckAnim || !dir) return;
  deckAnim = true;
  const n = POSES.length;
  document.querySelectorAll('.pcard').forEach(card => {
    const i = parseInt(card.dataset.i);
    let r = rel(i) - dir;
    if (r > n/2) r -= n; if (r < -n/2) r += n;
    const tx = -50+r*12, ty = -50+Math.abs(r)*10;
    card.style.transition = 'transform 0.52s cubic-bezier(0.34,1.15,0.64,1), opacity 0.4s ease';
    card.style.transform = `translate(${tx}%,${ty}%) rotate(${r*5.5}deg) scale(${1-Math.abs(r)*0.1})`;
    card.style.opacity = 1-Math.abs(r)*0.28;
    card.style.zIndex = n-Math.abs(r);
  });
  setTimeout(() => {
    poseIdx = ((poseIdx+dir)%n+n)%n;
    deckAnim = false;
    buildDeck();
  }, 530);
}

/* ── OVERLAY ──────────────────────────────────────────────── */
function openOverlay(idx) {
  activeDesign = idx; poseIdx = 0;
  const d = DESIGNS[idx];
  document.getElementById('ovTitle').textContent = d.name;
  document.getElementById('ovAttrs').innerHTML = d.attrs.map(a=>`<span>${a}</span>`).join('');
  buildDeck();
  document.getElementById('overlay').classList.add('open');
  // Pause auto-scroll while overlay is open
  cancelAnimationFrame(raf); lastTs = null;
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  if (playing) { lastTs = null; raf = requestAnimationFrame(autoScroll); }
}

// THREE ways to close: backdrop click, back button, Escape
document.getElementById('ovBackdrop').addEventListener('click', closeOverlay);
document.getElementById('ovBack').addEventListener('click', closeOverlay);
document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('open')) {
    if (e.key === 'ArrowRight') moveDeck(1);
    if (e.key === 'ArrowLeft')  moveDeck(-1);
    return;
  }
  if (e.key === 'Escape')      closeOverlay();
  if (e.key === 'ArrowRight')  moveDeck(1);
  if (e.key === 'ArrowLeft')   moveDeck(-1);
});

document.getElementById('deckNext').addEventListener('click', () => moveDeck(1));
document.getElementById('deckPrev').addEventListener('click', () => moveDeck(-1));

/* Swipe on deck stage */
let sx = 0, sy = 0;
document.getElementById('deckStage').addEventListener('touchstart', e => {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY;
}, { passive: true });
document.getElementById('deckStage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 34) moveDeck(dx < 0 ? 1 : -1);
}, { passive: true });

/* ── CUSTOM CURSOR (desktop only) ────────────────────────── */
const cur = document.getElementById('cursor');
if (cur) {
  let cx = 0, cy = 0, tx2 = 0, ty2 = 0;
  document.addEventListener('mousemove', e => { tx2 = e.clientX; ty2 = e.clientY; });
  (function loop() {
    cx += (tx2 - cx) * 0.14;
    cy += (ty2 - cy) * 0.14;
    cur.style.transform = `translate(calc(${cx}px - 50%), calc(${cy}px - 50%))`;
    requestAnimationFrame(loop);
  })();
  document.querySelectorAll('button, .design-card, .deck-arrow, .ov-back, .ov-backdrop, .pdot, .ov-pdot')
    .forEach(el => {
      el.addEventListener('mouseenter', () => cur.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cur.classList.remove('hovering'));
    });
  document.addEventListener('mousedown', () => cur.classList.add('clicking'));
  document.addEventListener('mouseup',   () => cur.classList.remove('clicking'));
}
</script>
