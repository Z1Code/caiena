<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carrusel Caiena</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #060606; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* ─── HEADER ─── */
.header { padding: 20px 24px 8px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.5; }
.header-cta { font-size: 11px; opacity: 0.4; }

/* ─── SECTION TITLE ─── */
.section-title { text-align: center; padding: 16px 24px 0; }
.section-title h2 { font-size: 22px; font-weight: 300; letter-spacing: 1px; }
.section-title p { font-size: 11px; opacity: 0.35; margin-top: 4px; letter-spacing: 1px; }

/* ─── DECK STAGE ─── */
.stage {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 32px 16px;
  position: relative;
}

.arrow {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; flex-shrink: 0;
  transition: background 0.2s, transform 0.15s;
  user-select: none;
  touch-action: manipulation;
}
.arrow:hover { background: rgba(255,255,255,0.12); }
.arrow:active { transform: scale(0.9); }

.deck-stage {
  position: relative;
  width: 200px;
  height: 280px;
  touch-action: pan-y;
}

/* ─── CARDS ─── */
.card {
  position: absolute;
  width: 168px;
  height: 240px;
  left: 50%; top: 50%;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  cursor: pointer;
  will-change: transform, opacity;
  transform-origin: center bottom;
  touch-action: manipulation;
}

.card-inner {
  width: 100%; height: 100%;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: flex-end;
}

.card-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
  z-index: 1;
}

.card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }

.card-info {
  position: relative; z-index: 2;
  padding: 12px;
}

.card-name { font-size: 13px; font-weight: 600; }
.card-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.card-tag {
  font-size: 9px; padding: 2px 6px; border-radius: 10px;
  background: rgba(255,255,255,0.12); letter-spacing: 0.3px;
}

.card-tap {
  position: absolute; top: 10px; right: 10px; z-index: 2;
  background: rgba(255,255,255,0.15); border-radius: 20px;
  padding: 3px 8px; font-size: 9px; letter-spacing: 1px;
  opacity: 0; transition: opacity 0.4s;
}

/* ─── SWIPE HINT ─── */
.swipe-hint {
  text-align: center; font-size: 10px; opacity: 0.25;
  padding-bottom: 12px; letter-spacing: 1px;
}

/* ─── DOTS ─── */
.dots {
  display: flex; justify-content: center; gap: 6px;
  padding-bottom: 24px;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: all 0.3s ease;
}
.dot.active { background: white; transform: scale(1.3); }

/* ─── MODAL ─── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
  display: flex; flex-direction: column;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal-header {
  display: flex; justify-content: space-between;
  align-items: flex-start;
  padding: 20px 20px 12px;
  flex-shrink: 0;
}
.modal-name { font-size: 20px; font-weight: 500; }
.modal-tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
.modal-tag {
  font-size: 10px; padding: 3px 9px; border-radius: 20px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12);
}
.close-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.08); display: flex;
  align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; flex-shrink: 0;
}

/* ─── VARIANT SWIPER ─── */
.variant-hint { text-align: center; font-size: 10px; opacity: 0.25; padding: 0 0 8px; letter-spacing: 1px; }

.variant-track-wrap {
  flex: 1; overflow: hidden; position: relative;
  touch-action: pan-x;
  display: flex; align-items: center;
  margin: 0 20px;
}

.variant-track {
  display: flex;
  gap: 12px;
  transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}

.variant-slide {
  min-width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}

.variant-img {
  width: 100%; max-width: 240px;
  aspect-ratio: 3/4;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  position: relative;
}

.variant-img-bg {
  width: 100%; height: 100%;
  display: flex; align-items: flex-end; padding: 10px;
}

.variant-pose { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; }

.variant-dots {
  display: flex; gap: 6px; justify-content: center;
  padding: 4px 0;
}
.variant-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: all 0.3s ease;
}
.variant-dot.active { background: white; }

.modal-cta {
  padding: 16px 20px 24px;
  flex-shrink: 0;
}
.cta-btn {
  width: 100%; padding: 14px;
  background: white; color: #000;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
}
</style>
</head>
<body>

<div class="header">
  <span class="logo">Caiena</span>
  <span class="header-cta">Ver todos →</span>
</div>

<div class="section-title">
  <h2>Nuestros Diseños</h2>
  <p>SWIPE · SELECCIONA · RESERVA</p>
</div>

<div class="stage">
  <div class="arrow" id="arrowPrev">←</div>
  <div class="deck-stage" id="deckStage"></div>
  <div class="arrow" id="arrowNext">→</div>
</div>

<div class="swipe-hint">← desliza o usa las flechas →</div>

<div class="dots" id="dots"></div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal-header">
    <div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-tags" id="modalTags"></div>
    </div>
    <div class="close-btn" id="closeBtn">✕</div>
  </div>

  <div class="variant-hint">DESLIZA PARA VER LAS 4 POSES</div>

  <div class="variant-track-wrap" id="variantWrap">
    <div class="variant-track" id="variantTrack"></div>
  </div>

  <div class="variant-dots" id="variantDots"></div>

  <div class="modal-cta">
    <button class="cta-btn">Quiero este diseño para mi cita →</button>
  </div>
</div>

<script>
const POSES = ['Garra','Ascendente','Doble','Rocío'];
const POSE_COLORS = [
  'linear-gradient(160deg,#2a1e1e,#0a0808)',
  'linear-gradient(160deg,#1e2a1e,#08100a)',
  'linear-gradient(160deg,#1e1e2a,#08080f)',
  'linear-gradient(160deg,#2a2a1e,#0f0f08)',
];

const DESIGNS = [
  { name:'French Nude',  tags:['Nude','Almendra','Glossy','French'],  color:'#c9b8a8', bg:'linear-gradient(145deg,#2a1e1a 0%,#0d0908 100%)' },
  { name:'Stars Blanco', tags:['Blanco','Almendra','Nail Art'],        color:'#e8e8e8', bg:'linear-gradient(145deg,#1e2a1e 0%,#090d09 100%)' },
  { name:'Rosa Sólido',  tags:['Rosa','Oval','Satinado'],              color:'#d4a0b0', bg:'linear-gradient(145deg,#2a1a22 0%,#0d080b 100%)' },
  { name:'Rojo Mate',    tags:['Rojo','Cuadrada','Matte'],             color:'#c03030', bg:'linear-gradient(145deg,#2a0e0e 0%,#0d0606 100%)' },
  { name:'Ombré Nude',   tags:['Nude','Almendra','Chrome','Ombré'],    color:'#bca898', bg:'linear-gradient(145deg,#1a1a2a 0%,#080810 100%)' },
];

// ─── STATE ───────────────────────────────────────────────────
let current = 0;
let isAnimating = false;
let variantIdx = 0;

// ─── DECK ────────────────────────────────────────────────────
function buildDeck() {
  const stage = document.getElementById('deckStage');
  stage.innerHTML = '';

  const n = DESIGNS.length;

  // Build dot indicators
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  DESIGNS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    dotsEl.appendChild(d);
  });

  // Determine render order: render far cards first (back to front)
  const order = [...Array(n).keys()].sort((a,b) => {
    return cardDepth(b,n) - cardDepth(a,n);
  });

  order.forEach(i => {
    const rel = relPos(i, n); // -2..+2
    const isFront = rel === 0;

    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + i;
    card.dataset.index = i;

    applyCardTransform(card, rel, false);
    card.style.opacity = Math.max(0, 1 - Math.abs(rel) * 0.22);
    card.style.zIndex = n - Math.abs(rel);
    card.style.transition = 'none';

    const d = DESIGNS[i];
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-bg" style="background:${d.bg}"></div>
        <div class="card-gradient"></div>
        <div class="card-tap" style="${isFront?'opacity:0.8':''}">TAP</div>
        <div class="card-info">
          <div class="card-name">${d.name}</div>
          <div class="card-tags">${d.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;

    if (isFront) card.addEventListener('click', openModal);
    stage.appendChild(card);
  });
}

function relPos(i, n) {
  let d = ((i - current) % n + n) % n;
  if (d > n/2) d -= n;
  return d;
}

function cardDepth(i, n) { return Math.abs(relPos(i, n)); }

function applyCardTransform(el, rel, animate) {
  const tx = -50 + rel * 9;
  const ty = -50 + Math.abs(rel) * 10;
  const rot = rel * 5;
  const scale = 1 - Math.abs(rel) * 0.08;
  el.style.transition = animate
    ? 'transform 0.55s cubic-bezier(0.34,1.1,0.64,1), opacity 0.4s ease, z-index 0s 0.1s'
    : 'none';
  el.style.transform = `translate(${tx}%,${ty}%) rotate(${rot}deg) scale(${scale})`;
}

function animateTo(dir) {
  if (isAnimating) return;
  isAnimating = true;

  const n = DESIGNS.length;
  const cards = document.querySelectorAll('.card');

  // Animate each card to its new position
  cards.forEach(card => {
    const i = parseInt(card.dataset.index);
    const newRel = relPos(i, n) - dir; // simulate next step
    let adjustedRel = newRel;
    // Wrap: if rel goes beyond n/2, wrap to other side
    if (adjustedRel > n/2) adjustedRel -= n;
    if (adjustedRel < -n/2) adjustedRel += n;

    applyCardTransform(card, adjustedRel, true);
    card.style.opacity = Math.max(0, 1 - Math.abs(adjustedRel) * 0.22);
    card.style.zIndex = n - Math.abs(adjustedRel);
  });

  setTimeout(() => {
    current = ((current + dir) % n + n) % n;
    isAnimating = false;
    buildDeck();
  }, 560);
}

// ─── SWIPE on DECK ───────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
document.getElementById('deckStage').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('deckStage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    animateTo(dx < 0 ? 1 : -1);
  }
}, { passive: true });

document.getElementById('arrowNext').addEventListener('click', () => animateTo(1));
document.getElementById('arrowPrev').addEventListener('click', () => animateTo(-1));

document.addEventListener('keydown', e => {
  if (document.getElementById('modalBg').classList.contains('open')) return;
  if (e.key === 'ArrowRight') animateTo(1);
  if (e.key === 'ArrowLeft') animateTo(-1);
});

// ─── MODAL ───────────────────────────────────────────────────
function openModal() {
  const d = DESIGNS[current];
  document.getElementById('modalName').textContent = d.name;
  document.getElementById('modalTags').innerHTML = d.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');

  // Build variant slides
  const track = document.getElementById('variantTrack');
  track.innerHTML = '';
  track.style.transform = 'translateX(0)';
  variantIdx = 0;

  POSES.forEach((pose, i) => {
    const slide = document.createElement('div');
    slide.className = 'variant-slide';
    slide.innerHTML = `
      <div class="variant-img">
        <div class="variant-img-bg" style="background:${POSE_COLORS[i]}">
          <span class="variant-pose">${pose}</span>
        </div>
      </div>`;
    track.appendChild(slide);
  });

  buildVariantDots();
  document.getElementById('modalBg').classList.add('open');
}

function buildVariantDots() {
  const el = document.getElementById('variantDots');
  el.innerHTML = '';
  POSES.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'variant-dot' + (i === variantIdx ? ' active' : '');
    d.addEventListener('click', () => goVariant(i));
    el.appendChild(d);
  });
}

function goVariant(idx) {
  variantIdx = Math.max(0, Math.min(POSES.length - 1, idx));
  const wrapW = document.getElementById('variantWrap').offsetWidth;
  document.getElementById('variantTrack').style.transform = `translateX(${-variantIdx * (wrapW + 12)}px)`;
  buildVariantDots();
}

// Swipe inside modal
let mTouchX = 0, mTouchY = 0;
document.getElementById('variantWrap').addEventListener('touchstart', e => {
  mTouchX = e.touches[0].clientX;
  mTouchY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('variantWrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - mTouchX;
  const dy = e.changedTouches[0].clientY - mTouchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
    goVariant(variantIdx + (dx < 0 ? 1 : -1));
  }
}, { passive: true });

document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('modalBg').classList.remove('open');
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('modalBg').classList.contains('open')) return;
  if (e.key === 'Escape') document.getElementById('modalBg').classList.remove('open');
  if (e.key === 'ArrowRight') goVariant(variantIdx + 1);
  if (e.key === 'ArrowLeft') goVariant(variantIdx - 1);
});

// ─── INIT ────────────────────────────────────────────────────
buildDeck();
</script>
</body>
</html>
